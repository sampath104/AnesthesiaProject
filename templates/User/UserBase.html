<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}User Dashboard - Anesthesia Predictor{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .bg-gradient-medical {
      background: linear-gradient(135deg, #00897b 0%, #0277bd 100%) !important;
    }

    .text-teal {
      color: #00897b !important;
    }

    .text-medical-blue {
      color: #0277bd !important;
    }

    .nav-link.active,
    .nav-link.fw-bold {
      background-color: rgba(255, 255, 255, 0.2) !important;
      color: #ffffff !important;
      border-radius: 0.5rem;
    }

    .nav-link:hover {
      background-color: rgba(255, 255, 255, 0.15) !important;
      color: #ffffff !important;
      border-radius: 0.5rem;
    }

    .btn-close-teal {
      filter: invert(44%) sepia(90%) saturate(748%) hue-rotate(-33deg) brightness(92%) contrast(91%);
    }

    body {
      background: linear-gradient(120deg, #e1f5fe 0%, #b2dfdb 100%);
      min-height: 100vh;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">

  <!-- Top navbar for mobile (hamburger) -->
  <nav class="navbar bg-gradient-medical navbar-dark d-lg-none">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('userhome') }}">
        <i class="fas fa-heartbeat me-2"></i>User Panel
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenuMobile">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>



  <!-- Main layout -->
  <div class="d-flex">
    <!-- Sidebar for large screens -->
    <nav class="d-none d-lg-block bg-gradient-medical text-white vh-100 p-3" style="width:250px; min-width:250px;">
      <div class="mb-4 text-center">
        <a class="navbar-brand fw-bold text-white" href="{{ url_for('userhome') }}">
          <i class="fas fa-heartbeat me-2"></i>User Panel
        </a>
      </div>
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a class="nav-link text-white {% if request.path == url_for('userhome') %}fw-bold text-warning{% endif %}"
            href="{{ url_for('userhome') }}">
            <i class="fas fa-home me-2"></i>Dashboard
          </a>
        </li>
        <a class="nav-link text-white {% if request.path == url_for('userpredict') %}fw-bold text-warning{% endif %}"
   href="{{ url_for('userpredict') }}">
   <i class="fas fa-stethoscope me-2"></i>Predict
</a>

        <li class="nav-item mb-2">
          <a class="nav-link text-white {% if request.path == url_for('usertips') %}fw-bold text-warning{% endif %}"
            href="{{ url_for('usertips') }}">
            <i class="fas fa-heartbeat me-2"></i>Health Tips
          </a>
        </li>

         <li class="nav-item mb-2">
          <a class="nav-link text-white {% if request.path == url_for('userfaq') %}fw-bold text-warning{% endif %}"
            href="{{ url_for('userfaq') }}">
            <i class="fas fa-heartbeat me-2"></i>FAQ
          </a>
        </li>

        <li class="nav-item mt-4">
          <a class="nav-link text-warning" href="{{ url_for('userlogout') }}">
            <i class="fas fa-sign-out-alt me-2"></i>Logout
          </a>
        </li>
      </ul>
    </nav>

    <!-- Page content -->
    <div class="flex-grow-1 p-3">
      {% block content %}{% endblock %}
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>

</html>
